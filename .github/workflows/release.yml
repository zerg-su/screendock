name: Release

# Build screendock.app on a free GitHub-hosted macOS runner. On a v* tag push it
# is published as a downloadable GitHub Release asset; manual runs just upload a
# build artifact for testing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write           # needed to create the release and upload assets

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=0.0.0-dev" >> "$GITHUB_ENV"
          fi

      - name: Build app bundle
        run: make app           # build-app.sh reads VERSION from the environment

      - name: Zip the app
        run: ditto -c -k --keepParent screendock.app "screendock-${VERSION}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: screendock-${{ env.VERSION }}
          path: screendock-*.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: screendock ${{ github.ref_name }}
          files: screendock-*.zip
          generate_release_notes: true
          body: |
            Unsigned, ad-hoc-signed build (no paid Apple Developer ID).

            macOS quarantines downloaded apps. If it refuses to open, clear the
            quarantine flag after moving it to /Applications:

                xattr -dr com.apple.quarantine /Applications/screendock.app

            Then grant **Accessibility** (System Settings -> Privacy & Security
            -> Accessibility) so clicking a tile can focus a window.
